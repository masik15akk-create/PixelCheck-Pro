<!-- pixelcheck_js.html — тест экрана на битые пиксели (HTML + Canvas) -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🖥️ PixelCheck Pro</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #info {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.7);
        }
        #hint {
            position: fixed;
            top: 20px;
            left: 20px;
            font-family: Arial, sans-serif;
            font-size: 16px;
            color: rgba(255,255,255,0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="info">Чёрный (0,0,0)</div>
    <div id="hint">Клик / Пробел — следующий цвет, ESC — выход</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const infoDiv = document.getElementById('info');

        const colors = [
            { name: 'Чёрный', r: 0, g: 0, b: 0 },
            { name: 'Белый', r: 255, g: 255, b: 255 },
            { name: 'Красный', r: 255, g: 0, b: 0 },
            { name: 'Зелёный', r: 0, g: 255, b: 0 },
            { name: 'Синий', r: 0, g: 0, b: 255 },
            { name: 'Жёлтый', r: 255, g: 255, b: 0 },
            { name: 'Пурпурный', r: 255, g: 0, b: 255 },
            { name: 'Голубой', r: 0, g: 255, b: 255 },
            { name: 'Серый', r: 128, g: 128, b: 128 }
        ];
        let current = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }

        function draw() {
            const c = colors[current];
            ctx.fillStyle = `rgb(${c.r},${c.g},${c.b})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Адаптивный цвет текста
            const brightness = (c.r + c.g + c.b) / 3;
            infoDiv.style.color = brightness < 128 ? '#fff' : '#000';
            infoDiv.textContent = `${c.name} (${c.r},${c.g},${c.b})`;
        }

        function nextColor() {
            current = (current + 1) % colors.length;
            draw();
        }

        // События
        window.addEventListener('resize', resize);
        canvas.addEventListener('click', nextColor);
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                nextColor();
            }
            if (e.key === 'Escape') {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else {
                    window.close();
                }
            }
        });

        // Полноэкранный режим по двойному клику
        canvas.addEventListener('dblclick', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        resize();
        // Стартовый полноэкранный режим (по желанию)
        // document.documentElement.requestFullscreen();
    </script>
</body>
</html>
